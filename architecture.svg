<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1120" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Teal Key Color Gradient -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#0099CC" />
    </linearGradient>

    <!-- Box Gradients -->
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1F2937" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <linearGradient id="boxHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#374151" />
      <stop offset="100%" stop-color="#1F2937" />
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.5" />
    </filter>
    
    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00E5FF" />
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280" />
    </marker>
  </defs>

  <!-- Canvas Background -->
  <rect width="1200" height="800" fill="url(#bg)" rx="16" />
  
  <!-- Subtle decorative grid -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
    <line x1="150" y1="0" x2="150" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="450" y1="0" x2="450" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="750" y1="0" x2="750" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="800"/>
    <line x1="1050" y1="0" x2="1050" y2="800"/>
  </g>

  <!-- Title -->
  <text x="60" y="70" fill="#FFFFFF" font-family="Pretendard, -apple-system, sans-serif" font-size="34" font-weight="800" filter="url(#shadow)">
    PPUDUCK<tspan fill="#00E5FF">X</tspan>SPOT <tspan fill="#9CA3AF" font-weight="500">서비스 아키텍처</tspan>
  </text>
  <text x="60" y="100" fill="#9CA3AF" font-family="Pretendard, -apple-system, sans-serif" font-size="16" font-weight="400">
    클라이언트 3D 렌더링, Next.js 서버 및 Supabase 백엔드를 포함한 전체 시스템 개요입니다.
  </text>
  <line x1="60" y1="120" x2="1140" y2="120" stroke="url(#tealGrad)" stroke-width="2" stroke-opacity="0.5" />

  <!-- ===============================
       CLIENT / PRESENTATION LAYER
       =============================== -->
  <!-- Layer Label -->
  <text x="60" y="160" fill="#00E5FF" font-family="Pretendard, -apple-system, sans-serif" font-size="14" font-weight="700" letter-spacing="2">프레젠테이션 / 클라이언트 계층</text>
  
  <rect x="60" y="180" width="350" height="560" rx="12" fill="none" stroke="#374151" stroke-width="2" stroke-dasharray="6,6" />
  
  <!-- Browser Box -->
  <rect x="80" y="200" width="310" height="520" rx="10" fill="url(#boxGrad)" stroke="url(#tealGrad)" stroke-width="2" filter="url(#shadow)" />
  <rect x="80" y="200" width="310" height="40" rx="10" fill="#1F2937" clip-path="inset(0 0 -10 0)" />
  <circle cx="100" cy="220" r="5" fill="#EF4444" />
  <circle cx="115" cy="220" r="5" fill="#EAB308" />
  <circle cx="130" cy="220" r="5" fill="#22C55E" />
  <text x="150" y="226" fill="#FFFFFF" font-family="Pretendard, system-ui, sans-serif" font-size="14" font-weight="600">웹 클라이언트 / 브라우저</text>

  <!-- 3D Canvas Engine -->
  <rect x="100" y="260" width="270" height="130" rx="8" fill="url(#boxHighlight)" stroke="#4B5563" stroke-width="1" />
  <text x="120" y="290" fill="#00E5FF" font-family="Pretendard, system-ui, sans-serif" font-size="16" font-weight="700">3D 인터랙션 계층</text>
  <text x="120" y="315" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• React Three Fiber (3D 렌더링)</text>
  <text x="120" y="335" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• Three.js 엔진</text>
  <text x="120" y="355" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• 커스텀 오리 씬 (GLTF 모델)</text>
  <text x="120" y="375" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• Drei 유틸리티</text>

  <!-- UI & Controls -->
  <rect x="100" y="410" width="270" height="130" rx="8" fill="url(#boxHighlight)" stroke="#4B5563" stroke-width="1" />
  <text x="120" y="440" fill="#00E5FF" font-family="Pretendard, system-ui, sans-serif" font-size="16" font-weight="700">UI 컴포넌트</text>
  <text x="120" y="465" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• Tailwind CSS + Framer Motion</text>
  <text x="120" y="485" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• Radix UI (접근성 컴포넌트)</text>
  <text x="120" y="505" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• 옵션 그리드 및 컨트롤 패널</text>
  <text x="120" y="525" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• 공유 카드 컴포넌트</text>

  <!-- Video & Media -->
  <rect x="100" y="560" width="270" height="80" rx="8" fill="url(#boxHighlight)" stroke="#4B5563" stroke-width="1" />
  <text x="120" y="585" fill="#00E5FF" font-family="Pretendard, system-ui, sans-serif" font-size="16" font-weight="700">미디어 생성</text>
  <text x="120" y="610" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• Remotion (이미지/비디오 렌더링)</text>
  <text x="120" y="630" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• Modern Screenshot (화면 캡처)</text>


  <!-- ===============================
       SERVER / APPLICATION LAYER
       =============================== -->
  <text x="450" y="160" fill="#00E5FF" font-family="Pretendard, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="2">애플리케이션 서버 계층</text>
  
  <rect x="450" y="180" width="310" height="560" rx="12" fill="none" stroke="#374151" stroke-width="2" stroke-dasharray="6,6" />
  
  <!-- Next.js Box -->
  <rect x="470" y="200" width="270" height="520" rx="10" fill="url(#boxGrad)" stroke="#4B5563" stroke-width="2" filter="url(#shadow)" />
  <rect x="470" y="200" width="270" height="40" rx="10" fill="#1F2937" clip-path="inset(0 0 -10 0)" />
  <text x="490" y="226" fill="#FFFFFF" font-family="Pretendard, system-ui, sans-serif" font-size="14" font-weight="600">Next.js 14+ (App Router 라우터)</text>

  <!-- SSR / Server Actions -->
  <rect x="490" y="260" width="230" height="110" rx="8" fill="url(#boxHighlight)" stroke="#4B5563" stroke-width="1" />
  <text x="510" y="290" fill="#FFFFFF" font-family="Pretendard, system-ui, sans-serif" font-size="16" font-weight="700">서버 아키텍처</text>
  <text x="510" y="315" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• App Router / 서버 사이드 렌더링</text>
  <text x="510" y="335" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• 페이지 렌더링 미들웨어</text>
  <text x="510" y="355" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• 동적 SEO 메타 태그</text>

  <!-- API Routes -->
  <rect x="490" y="390" width="230" height="150" rx="8" fill="url(#boxHighlight)" stroke="#4B5563" stroke-width="1" />
  <text x="510" y="420" fill="#FFFFFF" font-family="Pretendard, system-ui, sans-serif" font-size="16" font-weight="700">API 핸들러 및 훅</text>
  <text x="510" y="445" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• 결제 처리 훅</text>
  <text x="510" y="465" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• 파일 업로드 라우트</text>
  <text x="510" y="485" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• AI 생성 프록시</text>
  <text x="510" y="505" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• 공유 상태 관리</text>
  <text x="510" y="525" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• 이메일 전송 트리거</text>

  <!-- State & Utils -->
  <rect x="490" y="560" width="230" height="90" rx="8" fill="url(#boxHighlight)" stroke="#4B5563" stroke-width="1" />
  <text x="510" y="585" fill="#FFFFFF" font-family="Pretendard, system-ui, sans-serif" font-size="16" font-weight="700">서비스 연동</text>
  <text x="510" y="610" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• 외부 서비스 클라이언트</text>
  <text x="510" y="630" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• Supabase SSR 클라이언트</text>

  <!-- ===============================
       DATA & EXTERNAL SERVICES LAYER
       =============================== -->
  <text x="800" y="160" fill="#00E5FF" font-family="Pretendard, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="2">데이터 및 인프라 계층</text>
  
  <rect x="800" y="180" width="340" height="560" rx="12" fill="none" stroke="#374151" stroke-width="2" stroke-dasharray="6,6" />

  <!-- Supabase Box -->
  <rect x="820" y="200" width="300" height="230" rx="10" fill="#111827" stroke="#3FCF8E" stroke-width="2" filter="url(#shadow)" />
  <rect x="820" y="200" width="300" height="40" rx="10" fill="#1F2937" clip-path="inset(0 0 -10 0)" />
  <text x="840" y="226" fill="#3FCF8E" font-family="Pretendard, system-ui, sans-serif" font-size="15" font-weight="700">Supabase 백엔드 (BaaS)</text>

  <rect x="840" y="255" width="260" height="155" rx="8" fill="#1F2937" stroke="#3FCF8E" stroke-width="1" stroke-opacity="0.5" />
  <text x="860" y="280" fill="#E2E8F0" font-family="Pretendard, system-ui, sans-serif" font-size="15" font-weight="600">데이터베이스 및 스토리지</text>
  <text x="860" y="305" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• 인증 (카카오, 이메일 로그인)</text>
  <text x="860" y="325" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• PostgreSQL 데이터베이스</text>
  <text x="860" y="345" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">  - 주문 정보 및 설정 관리</text>
  <text x="860" y="365" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">• Edge 스토리지 (S3 호환)</text>
  <text x="860" y="385" fill="#D1D5DB" font-family="Pretendard, system-ui, sans-serif" font-size="14">  - 오리 렌더링 이미지, 에셋 보관</text>


  <!-- External API Box -->
  <rect x="820" y="450" width="300" height="270" rx="10" fill="url(#boxGrad)" stroke="#6366F1" stroke-width="2" filter="url(#shadow)" />
  <rect x="820" y="450" width="300" height="40" rx="10" fill="#1F2937" clip-path="inset(0 0 -10 0)" />
  <text x="840" y="475" fill="#818CF8" font-family="Pretendard, system-ui, sans-serif" font-size="15" font-weight="700">외부 API 연동</text>

  <!-- Portone Box -->
  <rect x="840" y="500" width="260" height="45" rx="6" fill="#1F2937" stroke="#6366F1" stroke-width="1" stroke-opacity="0.5" />
  <text x="860" y="527" fill="#E2E8F0" font-family="Pretendard, system-ui, sans-serif" font-size="14" font-weight="600">💸 PortOne (결제 모듈)</text>

  <!-- Gemini Box -->
  <rect x="840" y="555" width="260" height="45" rx="6" fill="#1F2937" stroke="#6366F1" stroke-width="1" stroke-opacity="0.5" />
  <text x="860" y="582" fill="#E2E8F0" font-family="Pretendard, system-ui, sans-serif" font-size="14" font-weight="600">🤖 Google Generative AI</text>

  <!-- Resend Box -->
  <rect x="840" y="610" width="260" height="45" rx="6" fill="#1F2937" stroke="#6366F1" stroke-width="1" stroke-opacity="0.5" />
  <text x="860" y="637" fill="#E2E8F0" font-family="Pretendard, system-ui, sans-serif" font-size="14" font-weight="600">📧 Resend (이메일 및 SMTP)</text>

  <!-- Vercel Deployment Box -->
  <rect x="840" y="665" width="260" height="45" rx="6" fill="#1F2937" stroke="#A8A29E" stroke-width="1" stroke-opacity="0.5" />
  <text x="860" y="692" fill="#E2E8F0" font-family="Pretendard, system-ui, sans-serif" font-size="14" font-weight="600">▲ Vercel 서버리스 &amp; Edge</text>


  <!-- ===============================
       CONNECTING LINES & FLOWS
       =============================== -->
  
  <!-- Client <-> Server (Data/Query) -->
  <path d="M 390 320 L 420 320 L 420 320 L 470 320" fill="none" stroke="url(#tealGrad)" stroke-width="3" marker-end="url(#arrow)" />
  <text x="395" y="310" fill="#00E5FF" font-family="Pretendard, system-ui, sans-serif" font-size="13" font-weight="600">HTML / 클라이언트 렌더링</text>
  
  <path d="M 470 410 L 420 410 L 420 410 L 390 410" fill="none" stroke="url(#tealGrad)" stroke-width="3" stroke-dasharray="4,4" marker-end="url(#arrow)" />
  <text x="395" y="400" fill="#00E5FF" font-family="Pretendard, system-ui, sans-serif" font-size="13" font-weight="600">API JSON 응답</text>


  <!-- Server <-> Supabase -->
  <path d="M 740 250 L 780 250 L 780 250 L 820 250" fill="none" stroke="#3FCF8E" stroke-width="3" marker-end="url(#arrow)" />
  <text x="750" y="240" fill="#3FCF8E" font-family="Pretendard, system-ui, sans-serif" font-size="13" font-weight="600">SSR 서버 DB 호출</text>

  <path d="M 820 370 L 780 370 L 780 440 L 740 440" fill="none" stroke="#3FCF8E" stroke-width="3" stroke-dasharray="4,4" marker-end="url(#arrow)" />
  <text x="750" y="430" fill="#3FCF8E" font-family="Pretendard, system-ui, sans-serif" font-size="13" font-weight="600">인증 및 데이터 송수신</text>


  <!-- Server <-> External APIs -->
  <path d="M 740 520 L 780 520 L 780 520 L 820 520" fill="none" stroke="#818CF8" stroke-width="2" marker-end="url(#arrow)" />
  <text x="750" y="510" fill="#818CF8" font-family="Pretendard, system-ui, sans-serif" font-size="13" font-weight="600">PortOne 결제 검증</text>

  <path d="M 740 580 L 780 580 L 780 580 L 820 580" fill="none" stroke="#818CF8" stroke-width="2" marker-end="url(#arrow)" />
  <text x="750" y="570" fill="#818CF8" font-family="Pretendard, system-ui, sans-serif" font-size="13" font-weight="600">AI 콘텐츠 추론 요청</text>

  <path d="M 740 630 L 780 630 L 780 630 L 820 630" fill="none" stroke="#818CF8" stroke-width="2" marker-end="url(#arrow)" />
  <text x="750" y="620" fill="#818CF8" font-family="Pretendard, system-ui, sans-serif" font-size="13" font-weight="600">메일 전송 요청</text>


  <!-- Client -> Portone Direct Check -->
  <path d="M 390 500 L 420 500 L 420 750 L 970 750 L 970 545" fill="none" stroke="#818CF8" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)" />
  <text x="430" y="740" fill="#818CF8" font-family="Pretendard, system-ui, sans-serif" font-size="13" font-weight="600">클라이언트 사이드 결제 UI / 위젯 호출 흐름</text>

</svg>
