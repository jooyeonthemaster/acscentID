<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AC'SCENT Mockups</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", Arial, sans-serif;
        background: #f6f1e8;
        color: #1d1a16;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 40px 20px 80px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      p {
        margin: 0 0 28px;
        color: #716b61;
      }
      .zip {
        display: inline-flex;
        margin-bottom: 32px;
        padding: 14px 18px;
        border-radius: 8px;
        background: #f6c945;
        color: #1d1a16;
        font-weight: 800;
        text-decoration: none;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
      }
      a.card {
        display: block;
        padding: 12px;
        border: 1px solid #e6dccd;
        border-radius: 8px;
        background: #fffdf8;
        color: inherit;
        text-decoration: none;
      }
      img {
        width: 100%;
        display: block;
        border-radius: 6px;
        background: #fff;
      }
      strong {
        display: block;
        margin-top: 10px;
        font-size: 14px;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AC'SCENT 목업 PNG</h1>
      <p>이미지를 클릭하면 원본 PNG가 열립니다. 상단 버튼은 전체 파일 zip 다운로드입니다.</p>
      <a class="zip" href="./acscent-mockups-download.zip" download>전체 zip 다운로드</a>
      <section class="grid">
        <a class="card" href="./acscent-home-actual-products.png" download>
          <img src="./acscent-home-actual-products.png" alt="" />
          <strong>acscent-home-actual-products.png</strong>
        </a>
        <a class="card" href="./acscent-idol-image-actual-detail.png" download>
          <img src="./acscent-idol-image-actual-detail.png" alt="" />
          <strong>acscent-idol-image-actual-detail.png</strong>
        </a>
        <a class="card" href="./acscent-chemistry-actual-detail.png" download>
          <img src="./acscent-chemistry-actual-detail.png" alt="" />
          <strong>acscent-chemistry-actual-detail.png</strong>
        </a>
        <a class="card" href="./acscent-sample-actual-detail.png" download>
          <img src="./acscent-sample-actual-detail.png" alt="" />
          <strong>acscent-sample-actual-detail.png</strong>
        </a>
        <a class="card" href="./acscent-cart-actual-products.png" download>
          <img src="./acscent-cart-actual-products.png" alt="" />
          <strong>acscent-cart-actual-products.png</strong>
        </a>
      </section>
    </main>
  </body>
</html>
